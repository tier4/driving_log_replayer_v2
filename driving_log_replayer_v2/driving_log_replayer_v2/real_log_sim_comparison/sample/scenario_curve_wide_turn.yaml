ScenarioFormatVersion: 3.0.0
ScenarioName: real_log_sim_comparison_curve_wide_turn
ScenarioDescription: |
  カーブ大回り課題の Sim 再現検証シナリオ。
  テレポート駅前交差点の左折（curve2: cx=89301, cy=43085）を主な検証箇所とする。

  検証軸:
    True Positive  (TP): 大回りモデル (sim_dp_0410) で大回りが再現されること
    False Negative (FN): ベストモデル (sim_dp_0303/0503) で大回りが発生しないこと

  使い方:
    make -C <この dir> local_cloud_run LOCAL_SCENARIO=$(pwd)/sample/scenario_curve_wide_turn.yaml
  事前に 28443458 を pull しておくこと:
    webauto data annotation-dataset pull --project-id x2_dev \
      --annotation-dataset-id 28443458-8d02-476d-b91c-528ea6027d18 --include-intermediate-artifacts

  結果の確認:
    report.html の「4. シナリオ クローズループ比較」セクションを確認。
    - curve2_analysis : 実機 vs 3 DP モデルの軌跡ズーム（大回りの有無を目視）
    - curve2_steering_detail / curve2_yaw_steer : ステア角・yaw 差の時系列
    - curve_diag/curve_divergence.md : 縦/横乖離の定量値（横乖離が大きければ大回り）
    TP = sim_dp_0410 の横乖離が顕著に大きい
    FN = sim_dp_0303 / sim_dp_0503 の横乖離が実機に近い（大回りしない）
SensorModel: aip_x2_gen2
VehicleModel: j6_gen2
Evaluation:
  UseCaseName: planning_control
  SubUseCaseName: real_log_sim_comparison
  UseCaseFormatVersion: 0.1.0
  Datasets:
    # Override_E2E_x2j6gen2_odaiba_2026-05-12-A09
    # j6_gen2 実機 E2E 走行、お台場エリア、2026-05-12 記録。
    # テレポート駅前交差点の左折 (curve2) を含む 276m / 60s の走行。
    - 28443458-8d02-476d-b91c-528ea6027d18:
        VehicleId: default
  Conditions:
    scenario_name: "カーブ大回り再現検証（テレポート駅前左折、DP 3モデル比較）"
    real_provenance: ""
    # replay: 実機 bag の信号を再現。
    # 大回りは信号に関係なく curve2 でのみ発生するためデフォルトで可。
    traffic_signals: replay
    loop_waypoints: 0
    reproduce_perception: false

    # ── モデルレジストリ ──────────────────────────────────────────────────────────
    # open-loop cases: 標準 VehicleModel 解析 (normal/kus0020/best_normal/no_delay/taiga_*) を使う。
    # sim_runs:  DP 3 モデル比較用 (大回り TP/FN 検証)。k_us=0.020 を全 run に設定。
    #
    # 検証軸:
    #   TP: dp_0410 (実機で大回りあり) → sim でも大回りが再現されること
    #   FN: dp_0303/dp_0503 (実機で大回りなし) → sim でも大回りが起きないこと
    #
    # k_us=0.020: simple_planning_simulator_v2 のアンダーステア補正。
    #   参考 PR: https://github.com/tier4/autoware_universe/pull/3039
    models:
      normal:
        vehicle_model_type: delay_steer_acc_geared_wo_fall_guard
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
      kus0020:
        vehicle_model_type: delay_steer_acc_geared_wo_fall_guard
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
        params: {k_us: 0.020}
      best_normal:
        vehicle_model_type: delay_steer_acc_geared_wo_fall_guard
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
        params: {k_us: 0.018, steer_time_constant: 0.15, debug_steer_scaling_factor: 1.0, acc_time_constant: 0.30}
      no_delay:
        vehicle_model_type: delay_steer_acc_geared_wo_fall_guard
        params: {acc_time_delay: 0.0, acc_time_constant: 0.0, steer_time_delay: 0.0, steer_time_constant: 0.0, steer_bias: 0.0}
      taiga_dyn:
        vehicle_model_type: taiga_dyn
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
      taiga_x:
        vehicle_model_type: taiga_x
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
      # DP 3 モデル比較 sim_runs (sim 専用; vehicle_model_type なし)
      dp_0303:
        # ベストモデル 0303: 実機で大回りなし (FN 検証用)
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
        dp_model_release: 20260303-180133_baseline_pre0060_sft0080
        params: {k_us: 0.020}
      dp_0503:
        # ベストモデル 0503: 実機で大回りなし (FN 検証用)
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
        dp_model_release: 20260503-220950_with_takanawa_16days_weak_smoothing__0060__0080
        params: {k_us: 0.020}
      dp_0410:
        # 大回りモデル 0410: 実機で大回りあり (TP 検証用)
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
        dp_model_release: 20260410-145919_lambda1e-6_ridge1e-8__epoch0020__epoch0040
        params: {k_us: 0.020}

    cases:    [normal, kus0020, best_normal, no_delay, taiga_dyn, taiga_x]
    sim_runs: [dp_0303, dp_0503, dp_0410]
    overlay:
      reference_tag: normal
      plots: [cascade_error]
