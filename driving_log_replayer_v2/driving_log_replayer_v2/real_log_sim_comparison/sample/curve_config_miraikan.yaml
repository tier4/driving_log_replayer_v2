# x2_dev/2231 テレポート駅→日本科学未来館 のカーブ別解析設定
#
# 他地図に流用する際は本ファイルをコピーして書き換え、scenario.yaml の
# Evaluation.Conditions.curve_config_yaml に相対パスを指定すること。

# 地図座標系でのカーブ中心（右折・左折・右折の順）
curve_centers:
  - {label: "カーブ①（右折）", cx: 89440, cy: 43200, margin: 20}
  - {label: "カーブ②（左折）", cx: 89301, cy: 43085, margin: 20}
  - {label: "カーブ③（右折）", cx: 89372, cy: 42830, margin: 40}

# curve_centers 内のカーブ② のインデックス（0始まり）
curve2_index: 1

# カーブ② 直前の一時停止を検出する時刻窓 [s]（AUTONOMOUS 開始からの経過時間）
curve2_window:
  start: 20.0
  end: 120.0

# 個別カーブ解析（curve{N}_analysis / steering_detail / yaw_steer / steer_response）を
# 生成する対象。各エントリ:
#   index         : curve_centers のインデックス（0始まり）
#   launch_window : 「停止 → 発進」を探索する時刻範囲 [s]
# 未指定の場合は `[{index: curve2_index, launch_window: curve2_window}]` が
# 暗黙に補完される（既存の curve2 のみ動作と等価）。
plot_curves:
  - {index: 1, launch_window: {start: 20.0, end: 120.0}}  # カーブ②（左折）
  # 将来追加例（停止 → 発進が無いカーブは検出失敗で自動スキップ）:
  # - {index: 0, launch_window: {start: 0.0,  end: 60.0}}   # カーブ①（右折）
  # - {index: 2, launch_window: {start: 60.0, end: 200.0}}  # カーブ③（右折）

# --- 以下、任意の拡張キー（未設定で構わない） ---

# 図タイトルに表示するシナリオ名。env: SCENARIO_NAME や --scenario-name で上書き可。
# scenario_name: "x2_dev/2231 テレポート駅→日本科学未来館"

# bicycle model 検証用ホイールベース [m] (実機 yaw_rate × steer から逆算した値)。
# シミュレータ仕様値 (wheelbase_sim) とは別に保持される。
# wheelbase_validation: 5.15

# シム車両モデルの wheelbase [m] (vehicle_info.param.yaml::wheel_base と一致させる)。
# 未指定なら j6_gen2_description/config/vehicle_info.param.yaml から自動取得。
# wheelbase_sim: 4.76012

# lanelet2_map.osm のパス。env: MAP_OSM_PATH / --map-osm が未指定の場合のフォールバック。
# 空文字を明示すると地図描画スキップ、絶対パスを指定すると当該地図を使用。
# map_osm_path: ""
