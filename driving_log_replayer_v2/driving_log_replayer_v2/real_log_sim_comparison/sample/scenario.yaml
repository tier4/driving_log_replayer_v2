ScenarioFormatVersion: 3.0.0
ScenarioName: real_log_sim_comparison
ScenarioDescription: |
  実機 rosbag (T4 dataset の input_bag) を SSOT として:
    Stage 1-2: lite 化と実機ログ解析
    Stage 3-4: 同走行を模擬する OpenSCENARIO を自動生成し sim_normal / sim_godot
               等で closed-loop 再現、実機と N-way 比較
    Stage 5-6: N-step VehicleModel 解析と ケース集約
SensorModel: aip_x2_gen2
VehicleModel: j6_gen2
Evaluation:
  UseCaseName: planning_control
  SubUseCaseName: real_log_sim_comparison
  UseCaseFormatVersion: 0.1.0
  # Datasets[0] の UUID = SSOT となる実機走行データを含む annotation-dataset の UUID。
  # input_bag/*.{mcap,db3} が AUTONOMOUS 走行を含む実機 rosbag として全 stage で使用される。
  # cloud: Web.Auto に登録する scenario の Datasets で指定。
  # local: `make local_cloud_run` 前にこの UUID を対象走行へ書き換え、事前取得しておくこと:
  #   webauto data annotation-dataset pull --project-id x2_dev \
  #     --annotation-dataset-id <UUID> --include-intermediate-artifacts
  Datasets:
    # Override_E2E_x2j6gen2_takanawa_2026-05-12-A09
    # (j6_gen2 実機 E2E 走行、高輪エリア、2026-05-12 記録)
    - f20a29ab-c42a-41b8-a446-f7e89d37a790:
        VehicleId: default
  Conditions:
    # 図タイトルに表示するシナリオ名 (任意。未指定なら ScenarioName を使用)
    scenario_name: "Override_E2E_x2j6gen2_takanawa_2026-05-12-A09"
    # カーブ別解析を有効化する設定 YAML への相対パス (scenario.yaml からの相対パス)。
    # 省略するとカーブ別プロット (curves_closeup / curve2_*) をスキップ。
    # 既存 curve 設定 YAML は特定 area_map に対する curve_centers をハードコード
    # 前提のため、別 map を使う dataset で実行する際は空文字でスキップする。
    curve_config_yaml: ""
    # VehicleModel N-step 解析 (Stage 5/6) のケース定義 YAML (必須)。
    # 未指定だとパイプラインが Stage 5 で失敗する (cases.yaml が見つかりません)。
    cases_config: ./cases.yaml
    # closed-loop シム実行 (Stage 3/4) のラン定義 YAML (必須)。
    # 未指定だと Stage 3 で失敗する (sim_runs.yaml が見つかりません)。
    sim_runs_config: ./sim_runs.yaml
    # 実機データ取得時の pilot-auto.x2 / DiffusionPlanner 重みの自由記述 (任意)。
    # 実機の版・重みは外部 (車両デプロイ) のため自動取得できない。記録すると比較プロット・
    # report.md の provenance に掲載され、sim 実行時の版・重み (自動取得) との差を解釈できる。
    # 例: real_provenance: "autoware v0.46.x (取得 2026-02) / DP exp older_real_v1"
    real_provenance: ""
    # 信号の扱い (既定 replay)。replay=実機 bag の信号タイムシリーズを再現。green=全信号常時 green。
    # sim 早期停止 (旧称 D0) の真因は **赤信号 replay**: sim ego の到達時刻が実機とずれる
    # (initialize_duration + planner pacing 差) ため、実機が green で通過した信号に sim ego が赤で
    # 当たり永久停止することがある。live sim A/B で確定 (replay=241m停止 / green=519m完走 exitSuccess,
    # 実機 598.7m)。実機が実際に通過したことを再現するには green が忠実。route 完走させ車両モデル比較を
    # 有効化したい場合 green を指定する。
    traffic_signals: replay
    # route-shaping 実験オプション (既定 0)。**D0 の修正ではない** (D0 の真因は上記の赤信号 replay で
    # あり routing ではない。lanelet graph に shortcut が無く start+goal でも route は周回全体を引く)。
    # N>0 で実走軌跡の膨らみ位置に中間 LanePosition waypoint を挿入し経路形状を強制する実験用。
    loop_waypoints: 0
    # perception 再生 (既定 false)。true で実機 input_bag の先行車を ego-pose 同期で各 sim に注入
    # (perception_reproducer_node を step3 が並走起動)。auto-scenario は NPC を持たないため、実機の
    # 先行車追従 (発進前/カーブ等の停止・加減速) を再現するにはこれを有効化する。実機が先行車追従
    # 主体の走行 (cruise_following 等) で、sim ego が先行車不在により自由加速して実機より速くなるのを
    # 防ぎ、速度プロファイルを実機に近づける。注入先 topic は tracking/objects (DiffusionPlanner 入力)。
    reproduce_perception: false
