# Stage 3: closed-loop シム実行のラン定義 (cloud / local 共通)。
# 既定は 4-way (sim_normal / sim_kus0020 / sim_perfect / sim_godot) 比較。
#
# vehicle_model のサフィックスで sim 種別を切り替える (scenario_test_runner.launch.py):
#   j6_gen2                 : DELAY_STEER_ACC_GEARED_WO_FALL_GUARD (j6_gen2_description の dynamics 既定)
#   j6_gen2_perfect_tracker : PERFECT_TRAJECTORY_TRACKER (planner 軌跡を理想追従。Godot binary 不要)
#   j6_gen2_godot           : EXTERNAL (Godot binary 必須。godot_executable で指定)
#
# Godot バイナリパスは cloud / local 共通で /opt/godot_autoware_simulator/ に統一。
#   cloud : .webauto-ci/main/autoware-setup/run.sh が v0.6.2 を /opt に配置 (自動)。
#   local : 同じ /opt に配置 or symlink する (詳細は README.ja.md)。
#
# params: simulator_model パラメータ上書き (cases.yaml の params と同型)。
#   step3_run_sims が simple_sensor_simulator.<key>:=<value> として launch に渡し、
#   description の simulator_model.param.yaml を上書きする (後勝ち)。
#   description パッケージを増やさずに dynamics 変種 (例 k_us) を作れる。

sim_runs:
  # j6_gen2_description の DELAY_STEER_ACC_GEARED_WO_FALL_GUARD (dynamics 既定値)
  - tag: sim_normal
    vehicle_model: j6_gen2
    architecture_type: awf/universe/20250130

  # j6_gen2 + アンダーステア係数 k_us=0.020 rad/(m/s^2)。
  # ω = vx·tan(δ)/(L + k_us·vx^2)。k_us=0 で理想 bicycle に一致。
  - tag: sim_kus0020
    vehicle_model: j6_gen2
    architecture_type: awf/universe/20250130
    params:
      k_us: 0.020

  # DELAY_STEER_ACC_GEARED_WO_FALL_GUARD の最善パラメータ調整版。
  # 実機ログ (takanawa 2026-05-12-A09) の N-step rollout (N=20 終端誤差) を
  # 結合グリッド探索で最小化した同定値 (1 パラメータずつの最適値は相関があるため
  # 結合探索で決定。param_sweep/ の 1D/2D sweep 図も参照):
  #   yaw RMSE 0.305→0.170 deg (-44%), 位置 7.68→5.42 cm (-29%) vs 仕様値。
  # acc_time_constant は 0.6 超で飽和 (0.8 で +2% 改善のみ・yaw 微悪化) のため 0.6。
  - tag: best_normal
    vehicle_model: j6_gen2
    architecture_type: awf/universe/20250130
    params:
      k_us: 0.005
      steer_time_constant: 0.30
      debug_steer_scaling_factor: 0.90
      acc_time_constant: 0.60

  # 理想軌跡追従 (planner 出力を完全追従)。dynamics 誤差ゼロの上限基準。
  - tag: sim_perfect
    vehicle_model: j6_gen2_perfect_tracker
    architecture_type: awf/universe/20250130

  # 外部 Godot シム。cloud / local 共通で /opt 配下の Godot バイナリを使用。
  - tag: sim_godot
    vehicle_model: j6_gen2_godot
    architecture_type: awf/universe/20250130
    godot_executable: /opt/godot_autoware_simulator/godot_autoware_simulator.x86_64
