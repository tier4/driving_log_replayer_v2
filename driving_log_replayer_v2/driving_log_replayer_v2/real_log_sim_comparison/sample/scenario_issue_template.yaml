ScenarioFormatVersion: 3.0.0
ScenarioName: real_log_sim_comparison_issue_<課題名>
ScenarioDescription: |
  実機課題の Sim 再現検証シナリオ（テンプレート）。
  UUID を自分の評価対象データセットに書き換えてから使用すること。

  課題ごとのセットアップ概要:
    ①カーブ大回り  : scenario_curve_wide_turn.yaml を使用（このファイルは不要）
    ②停止位置手前  : 停止線手前での停止挙動を含む dataset。
                     step4 の velocity.fig.json / acceleration.fig.json で全軌跡を確認。
    ③急ブレーキ    : 同上。accel 時系列の急変化を velocity.fig.json で目視確認。
    ④加速不足      : 40km/h まで加速するシーンを含む dataset。
                     step4 の全軌跡 velocity.fig.json / velocity_vs_distance.fig.json で確認。
    ⑤発進停止振動  : 一時停止からの発進窓を含む dataset。
                     step4 の velocity.fig.json / acceleration.fig.json で全軌跡を確認。

  使い方:
    1. このファイルをコピーして名前を変える: scenario_issue_<課題名>.yaml
    2. Datasets の UUID を差し替える
    3. make -C <この dir> local_cloud_run LOCAL_SCENARIO=$(pwd)/sample/scenario_issue_<課題名>.yaml
    事前に対象 dataset を pull すること:
      webauto data annotation-dataset pull --project-id x2_dev \
        --annotation-dataset-id <UUID> --include-intermediate-artifacts
SensorModel: aip_x2_gen2
VehicleModel: j6_gen2
Evaluation:
  UseCaseName: planning_control
  SubUseCaseName: real_log_sim_comparison
  UseCaseFormatVersion: 0.1.0
  Datasets:
    # TODO: 対象課題を含む実機走行データセットの UUID に書き換えること。
    # 課題が観測された実機走行の annotation-dataset を webauto で確認して UUID を取得する。
    - <DATASET_UUID>:
        VehicleId: default
  Conditions:
    scenario_name: "<課題名> 再現検証"
    cases_config: ./cases.yaml
    sim_runs_config: ./sim_runs.yaml
    # real_provenance: 実機 bag 取得時の pilot-auto.x2 / DP モデル版を記録しておく。
    #   課題の TP/FN 解釈に使うため、実機走行時のモデル版を明記することを推奨。
    real_provenance: ""
    traffic_signals: replay
    loop_waypoints: 0
    reproduce_perception: false
