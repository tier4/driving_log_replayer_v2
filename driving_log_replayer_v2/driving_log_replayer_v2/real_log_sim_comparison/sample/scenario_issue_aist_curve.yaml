ScenarioFormatVersion: 3.0.0
ScenarioName: real_log_sim_comparison_issue_aist_curve
ScenarioDescription: |
  産総研脇〜テレコムセンター駅前 左カーブ大回り 課題の Sim 再現検証シナリオ。
  左カーブで走行速度が速いが減速する速度計画が発生せず、
  右側に膨らみガードレールに衝突するリスクを検証する。

  発生事象（DevOps分析_お台場.xlsx / シナリオ作成状況サマリ より）:
    産総研脇交差点〜テレコムセンター駅前交差点間の左カーブで、
    定速で左旋回する際、走行速度が速いが減速する速度計画が発生せず、
    右側に膨らみ、ガードレールに衝突する可能性があったためOR。
  機能分類: 08.DiffusionPlanner / カテゴリ: 右左折 / 優先度: Highest
  rosbag file_id (一次): 2a01750d-e115-4191-9252-9aeebe6c7455 (2026-03-17)
  rosbag file_id (代替): 80fbdebe-4d87-4375-b896-b4e77f75a5e5 (2026-03-31)
  environment_id: ce963c1f-1ee9-4357-b0b6-00b6b6ae5984

  検証軸:
    True Positive  (TP): 大回りモデル (sim_dp_0410) で大回りが再現されること
    False Negative (FN): ベストモデル (sim_dp_0303/0503) で大回りが発生しないこと

  事前準備（rosbag から dataset を構築する場合）:
    make -C <このディレクトリ> issue_scenario \
      ROSBAG_ID=2a01750d-e115-4191-9252-9aeebe6c7455 \
      TEMPLATE=$(pwd)/sample/scenario_issue_aist_curve.yaml

  実行（dataset 構築後）:
    make -C <このディレクトリ> local_cloud_run \
      WEBAUTO_T4_ROOT=$(pwd)/work/dataset \
      LOCAL_SCENARIO=work/scenario_<uuid>.yaml

  結果の確認:
    report.html の「シナリオ クローズループ比較」を確認。
    velocity.fig.json / acceleration.fig.json で速度プロファイルを確認する。
    TP = sim_dp_0410 の横乖離が顕著に大きい（速度超過・大回り再現）
    FN = sim_dp_0303 / sim_dp_0503 の横乖離が実機に近い

SensorModel: aip_x2_gen2
VehicleModel: j6_gen2
Evaluation:
  UseCaseName: planning_control
  SubUseCaseName: real_log_sim_comparison
  UseCaseFormatVersion: 0.1.0
  Datasets:
    # 産総研脇〜テレコム左カーブ大回り課題を含む実機走行データセット。
    # webauto data annotation-dataset pull --project-id x2_dev \
    #   --annotation-dataset-id ab9a2ae2-dccb-48b6-9c39-24eadb062841 --include-intermediate-artifacts
    # または download.py / make issue_scenario でローカルデータセットを構築する。
    # 既存 annotation-dataset 名: Override_E2E_x2j6gen2_odaiba_2026-03-17-A39
    - ab9a2ae2-dccb-48b6-9c39-24eadb062841:
        VehicleId: default
  Conditions:
    scenario_name: "産総研〜テレコム 左カーブ大回り 再現検証（DP 3モデル比較）"
    # real_provenance: 実機走行時の pilot-auto.x2 ブランチ / DP モデル版の記録。
    # Slack #group-reference-vehicle-x2-experiment, スレッド「2026/03/17 MJ20-003 beta/v4.3.1.2 お台場走行」
    # OTA image: evaluation.tier4.jp/evaluation/reports/76851310-c69d-5b01-887f-eef9d055a821
    real_provenance: "2026-03-17 お台場, MJ20-003 (J6 gen2), pilot-auto.x2 beta/v4.3.1.2"
    # replay: 実機 bag の信号を再現。
    # 停止→発進なしの定速走行課題のため traffic_signals の影響は小さい。
    traffic_signals: replay
    loop_waypoints: 0
    reproduce_perception: false

    models:
      normal:
        vehicle_model_type: delay_steer_acc_geared_wo_fall_guard
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
      kus0020:
        vehicle_model_type: delay_steer_acc_geared_wo_fall_guard
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
        params: {k_us: 0.020}
      best_normal:
        vehicle_model_type: delay_steer_acc_geared_wo_fall_guard
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
        params: {k_us: 0.018, steer_time_constant: 0.15, debug_steer_scaling_factor: 1.0, acc_time_constant: 0.30}
      no_delay:
        vehicle_model_type: delay_steer_acc_geared_wo_fall_guard
        params: {acc_time_delay: 0.0, acc_time_constant: 0.0, steer_time_delay: 0.0, steer_time_constant: 0.0, steer_bias: 0.0}
      taiga_dyn:
        vehicle_model_type: taiga_dyn
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
      taiga_x:
        vehicle_model_type: taiga_x
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
      # DP 3 モデル比較 sim_runs (sim 専用; vehicle_model_type なし)
      dp_0303:
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
        dp_model_release: 20260303-180133_baseline_pre0060_sft0080
        params: {k_us: 0.020}
      dp_0503:
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
        dp_model_release: 20260503-220950_with_takanawa_16days_weak_smoothing__0060__0080
        params: {k_us: 0.020}
      dp_0410:
        vehicle_model: j6_gen2
        architecture_type: awf/universe/20250130
        dp_model_release: 20260410-145919_lambda1e-6_ridge1e-8__epoch0020__epoch0040
        params: {k_us: 0.020}

    cases:    [normal, kus0020, best_normal, no_delay, taiga_dyn, taiga_x]
    sim_runs: [dp_0303, dp_0503, dp_0410]
    overlay:
      reference_tag: normal
      plots: [cascade_error, error_timeseries]
