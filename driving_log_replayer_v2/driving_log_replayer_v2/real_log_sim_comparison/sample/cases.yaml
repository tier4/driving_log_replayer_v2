# VehicleModel 解析 (Stage 3) のケース定義。
# 各ケースは出力ディレクトリ nstep/<tag>/ に独立して書かれる。
# Stage 4 (analyze_cases) はこの定義を読んで cases/overlay/ と cases_summary.md を生成。
#
# vehicle_model:
#   - delay_steer_acc_geared_wo_fall_guard : 既定モデル (15 パラメータ)
#   - ideal_steer_acc                       : 理想モデル (wheelbase のみ)
#
# params に未指定のキーは load_sim_params() の base
# (j6_gen2_description/config/simulator_model.param.yaml + vehicle_info.param.yaml)
# で補完される (steer_bias は step5 の _PARAMS_OVERRIDES で 0.01)。

cases:
  - tag: baseline
    vehicle_model: delay_steer_acc_geared_wo_fall_guard
    params:
      wheelbase: 4.76012

  # baseline + アンダーステア係数 k_us=0.020 rad/(m/s^2)。
  # ω = vx·tan(δ)/(L + k_us·vx^2)。baseline (k_us=0) との差で understeer の寄与を切り分ける。
  - tag: kus0020
    vehicle_model: delay_steer_acc_geared_wo_fall_guard
    params:
      wheelbase: 4.76012
      k_us: 0.020

  # 複数データセット横断でロバスト同定した最善パラメータ調整版 (sim_runs.yaml の best_normal と同一)。
  # E2E 自律走行 9 データセット・2 エリア横断 (takanawa: Override A09, 8edfbb02, Auto route01〜04 /
  # odaiba: Override A09・A93・B38) の open-loop N=20 rollout 終端誤差を、各データセットの baseline 比に
  # 正規化した上で dataset 横断平均を最小化 (worst 非悪化を制約) して同定
  # (multi_dataset_tune.py + make local_multidataset_run)。
  # 単一データセット同定の旧値 (k_us=0.005, steer_time_constant=0.30, debug_steer_scaling_factor=0.90)
  # は 1 データセットに過適合し他で kus0020 に劣っていた。横断最適化で以下に収束 (6→9 データセット・
  # 別エリア追加でも不変 = 汎化を確認):
  #   k_us=0.018 (物理 understeer, 実機直接推定 ~0.022 と整合), steer_time_constant=0.12,
  #   debug_steer_scaling_factor=0.98 (≒仕様値), acc_time_constant=0.45 (縦方向)。
  #   正規化 yaw@N20: mean 0.565 / worst 0.688 (baseline=1.0)、正規化 pos@N20: mean 0.858。
  #   kus0020 (yaw mean 0.615 / pos mean 0.983) を全 9 データセットの yaw・pos で上回る。
  - tag: best_normal
    vehicle_model: delay_steer_acc_geared_wo_fall_guard
    params:
      wheelbase: 4.76012
      k_us: 0.018                       # 物理 understeer (実機推定 ~0.022 と整合)
      steer_time_constant: 0.12         # 横断最適 (worst-case dataset の yaw を改善)
      debug_steer_scaling_factor: 0.98  # ≒仕様値 (1.0)
      acc_time_constant: 0.45           # 縦方向 (pos を改善)

  - tag: ideal_steer
    vehicle_model: ideal_steer_acc
    params:
      wheelbase: 4.76012
      # ideal_steer_acc は内部 bias を持たないため、Python 側の予測値計算
      # (sim_steer_kp1 = state + params.steer_bias) が phantom bias を乗せないよう
      # 0.0 を明示する (未指定だと load_sim_params() のシム仕様 steer_bias ≈ 0.0005 が
      # 継承され、bias を持たない ideal_steer に余計なオフセットが乗る)。
      steer_bias: 0.0

overlay:
  reference_tag: baseline
  plots:
    - cascade_error
    - error_timeseries
