# VehicleModel 解析 (Stage 3) のケース定義。
# 各ケースは出力ディレクトリ nstep/<tag>/ に独立して書かれる。
# Stage 4 (analyze_cases) はこの定義を読んで cases/overlay/ と cases_summary.md を生成。
#
# vehicle_model:
#   - delay_steer_acc_geared_wo_fall_guard : 既定モデル (15 パラメータ)
#   - ideal_steer_acc                       : 理想モデル (wheelbase のみ)
#
# params に未指定のキーは load_sim_params() の base
# (j6_gen2_description/config/simulator_model.param.yaml + vehicle_info.param.yaml)
# で補完される (steer_bias は step5 の _PARAMS_OVERRIDES で 0.01)。

cases:
  - tag: baseline
    vehicle_model: delay_steer_acc_geared_wo_fall_guard
    params:
      wheelbase: 4.76012

  # baseline + アンダーステア係数 k_us=0.020 rad/(m/s^2)。
  # ω = vx·tan(δ)/(L + k_us·vx^2)。baseline (k_us=0) との差で understeer の寄与を切り分ける。
  - tag: kus0020
    vehicle_model: delay_steer_acc_geared_wo_fall_guard
    params:
      wheelbase: 4.76012
      k_us: 0.020

  # 複数データセット横断でロバスト同定した最善パラメータ調整版 (sim_runs.yaml の best_normal と同一)。
  # データセット A (f20a29ab) / B (8edfbb02) の open-loop N=20 rollout 終端誤差を、各データセットの
  # baseline 比に正規化した上で dataset 横断の平均を最小化 (worst 非悪化を制約) して同定
  # (multi_dataset_tune.py)。単一データセット同定の旧値 (k_us=0.005, steer_time_constant=0.30,
  # debug_steer_scaling_factor=0.90) は A に過適合し B では kus0020 に劣っていた。横断最適化により
  # steer_time_constant / debug_steer_scaling_factor は仕様値 (0.15 / 1.0) が最善となり (= 過適合の矯正)、
  # 物理的な understeer k_us=0.02 (実機直接推定 ~0.022 と整合) + 縦方向 acc_time_constant=0.60 に集約。
  #   正規化 yaw@N20: mean 0.728→0.506 (worst 0.901→0.526)、正規化 pos@N20: mean ~0.86 維持。
  - tag: best_normal
    vehicle_model: delay_steer_acc_geared_wo_fall_guard
    params:
      wheelbase: 4.76012
      k_us: 0.02                        # 物理 understeer (実機推定 ~0.022 と整合)
      steer_time_constant: 0.15         # = 仕様値 (横断最適。旧 0.30 は A 過適合のため戻した)
      debug_steer_scaling_factor: 1.0   # = 仕様値 (横断最適。旧 0.90 は A 過適合のため戻した)
      acc_time_constant: 0.60           # 縦方向 (A の pos を大きく改善、B は微悪化)

  - tag: ideal_steer
    vehicle_model: ideal_steer_acc
    params:
      wheelbase: 4.76012
      # ideal_steer_acc は内部 bias を持たないため、Python 側の予測値計算
      # (sim_steer_kp1 = state + params.steer_bias) が phantom bias を乗せないよう
      # 0.0 を明示する (未指定だと load_sim_params() のシム仕様 steer_bias ≈ 0.0005 が
      # 継承され、bias を持たない ideal_steer に余計なオフセットが乗る)。
      steer_bias: 0.0

overlay:
  reference_tag: baseline
  plots:
    - cascade_error
    - error_timeseries
