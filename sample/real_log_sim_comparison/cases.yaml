# VehicleModel 解析 (Stage 3) のケース定義 (クラウド既定)。
# 各ケースは出力ディレクトリ per_step/<tag>/ に独立して書かれる。
# Stage 4 (analyze_cases) はこの定義を読んで cases/overlay/ と cases_summary.md を生成。
#
# vehicle_model:
#   - delay_steer_acc_geared_wo_fall_guard : 既定モデル (15 パラメータ)
#   - ideal_steer_acc                       : 理想モデル (wheelbase のみ)
#
# params に未指定のキーは load_sim_params() の base
# (best_model_description/config/simulator_model.param.yaml + vehicle_info.param.yaml)
# で補完される。

cases:
  - tag: baseline
    vehicle_model: delay_steer_acc_geared_wo_fall_guard
    params:
      wheelbase: 4.76012
      steer_bias: 0.01
      steer_time_constant: 0.4983

overlay:
  reference_tag: baseline
  plots:
    - cascade_error
    - error_timeseries
