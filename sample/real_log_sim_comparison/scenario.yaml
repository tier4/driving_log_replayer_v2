ScenarioFormatVersion: 3.0.0
ScenarioName: real_log_sim_comparison_miraikan
ScenarioDescription: |
  Real-log lite-fication + sim_normal + sim_godot + compare_logs analysis
  for the x2_dev_teleport_to_miraikan route.
SensorModel: aip_x2_gen2
VehicleModel: j6_gen2
Evaluation:
  UseCaseName: planning_control
  SubUseCaseName: real_log_sim_comparison
  UseCaseFormatVersion: 0.1.0
  # Using a fake (unrelated) T4 dataset for Web.Auto triggering.
  # The evaluator orchestrates its own simulator runs independently
  # of the bound dataset path, so the dataset content is not consumed.
  # Fake dataset: ReferenceDriving_E2E_PlanningControl_odaiba.Auto_04_route03_case02
  Datasets:
    - 67db293e-903e-4397-b603-be6b88d98be7:
        VehicleId: default
  Conditions:
    # 図タイトルに表示するシナリオ名 (任意。未指定なら ScenarioName を使用)
    scenario_name: "x2_dev/2231 テレポート駅→日本科学未来館"
    # カーブ別解析を有効化する設定 YAML への相対パス (scenario.yaml からの相対パス)。
    # 省略するとカーブ別プロット (curves_closeup / curve2_*) をスキップ。
    # 異なるシナリオでは curve_config_yaml キーを削除するか、空文字にしてください。
    curve_config_yaml: ./curve_config_miraikan.yaml
