ScenarioFormatVersion: 3.0.0
ScenarioName: ground_segmentation-sample
ScenarioDescription: ground_segmentation-sample
SensorModel: sample_sensor_kit
VehicleModel: sample_vehicle
Evaluation:
  UseCaseName: ground_segmentation
  UseCaseFormatVersion: 0.3.0
  Datasets:
    - sample_dataset:
        VehicleId: default
  Conditions:
    Method: annotated_pcd
    ground_label:
      - drivable_surface # name of class that is considered as ground, which can be drivable_surface, manmade, other_flat_surface, vegetation, sidewalk
      - sidewalk
    obstacle_label:
      - car  # name of class that is considered as obstacle, which can be car, pedestrian, emergency_vehicle, truck, tractor_unit, semi_trailer, bus, bicycle, motorcycle, construction_vehicle
      - bus
      - bicycle
      - motorcycle
    accuracy_min: 0.8
    accuracy_max: 1
    PassRate: 99

# Example of category names and indices loaded from category.json:
