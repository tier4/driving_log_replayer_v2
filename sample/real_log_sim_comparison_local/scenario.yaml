ScenarioFormatVersion: 3.0.0
ScenarioName: real_log_sim_comparison_miraikan_local
ScenarioDescription: |
  Local execution of the real-log lite-fication + compare_logs pipeline.
  Uses a T4 dataset that has been pulled to the local webauto cache with
  `webauto data annotation-dataset pull --include-intermediate-artifacts`.
  Cloud-equivalent of sample/real_log_sim_comparison/scenario.yaml.
SensorModel: aip_x2_gen2
VehicleModel: j6_gen2
Evaluation:
  UseCaseName: planning_control
  SubUseCaseName: real_log_sim_comparison
  UseCaseFormatVersion: 0.1.0
  # ローカル実行では Datasets[0] のキー UUID をローカルキャッシュから探索して使う。
  # デフォルトの UUID は cloud scenario.yaml と同じ Web.Auto trigger 用既定値であり、
  # 比較したい実走行と一致するとは限らない。`make local_cloud_run` を回す前に
  # 自分の対象走行の annotation-dataset-id に必ず書き換えること。
  #
  # 取得方法:
  #   webauto data annotation-dataset pull \
  #     --project-id x2_dev \
  #     --annotation-dataset-id <UUID> \
  #     --include-intermediate-artifacts
  Datasets:
    - 67db293e-903e-4397-b603-be6b88d98be7:
        VehicleId: default
  Conditions:
    # 図タイトルに表示するシナリオ名 (任意。未指定なら ScenarioName を使用)
    scenario_name: "x2_dev/2231 テレポート駅→日本科学未来館"
    # カーブ別解析を有効化する設定 YAML への相対パス (scenario.yaml からの相対パス)。
    # 既定はクラウド版と共有する curve_config_miraikan.yaml への相対シンボリックリンク。
    curve_config_yaml: ./curve_config_miraikan.yaml
    # VehicleModel 解析 (Stage 3) のケース定義 YAML への相対パス (必須)。
    # 各ケースは (vehicle_model タイプ, params) のペアで、出力は per_step/<tag>/ に分かれる。
    # 最後に Stage 4 (analyze_cases) が cases/overlay/ と cases_summary.md を生成。
    cases_config: ./cases.yaml
